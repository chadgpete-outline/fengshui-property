name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # The build compiles routes; it doesn't call external services or the
          # DB (schema init is lazy at request time), so no real secrets needed.
          SESSION_SECRET: ci-build-not-a-real-secret
